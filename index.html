<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federal Contracts Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-dim: #8a8580;
    --rule: #e6e1d8;
    --rule-strong: #2a2a2a;
    --accent: #c8392a;
    --accent-soft: #f4e4e0;
    --green: #2d6a3e;
    --amber: #b8741a;
    --serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    padding: 32px 24px 60px;
    max-width: 1280px;
    margin: 0 auto;
    font-size: 14px;
  }
  /* ===== MASTHEAD ===== */
  .masthead {
    border-bottom: 3px solid var(--rule-strong);
    padding-bottom: 16px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .masthead h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 700;
  }
  .masthead-meta {
    text-align: right;
    font-size: 11px;
    line-height: 1.6;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .masthead-meta strong { color: var(--ink); font-weight: 600; }
  .masthead-meta .accent { color: var(--accent); }
  
  /* ===== STATS ===== */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 28px;
  }
  .stat {
    padding: 14px 18px;
    border-right: 1px solid var(--rule);
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 28px;
    line-height: 1;
    color: var(--ink);
  }
  .stat-value.accent { color: var(--accent); }
  .stat-sub {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  
  /* ===== FILTERS ===== */
  .controls {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 18px;
    margin-bottom: 20px;
  }
  .filters {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  @media (max-width: 1100px) {
    .filters { grid-template-columns: 1fr 1fr 1fr; }
  }
  @media (max-width: 700px) {
    .filters { grid-template-columns: 1fr 1fr; }
  }
  .filter-group label {
    display: block;
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }
  select, input[type="text"] {
    width: 100%;
    background: white;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 7px 9px;
    border-radius: 0;
    font-family: var(--sans);
    font-size: 13px;
    max-width: 100%;
    text-overflow: ellipsis;
  }
  select { cursor: pointer; }
  input[type="text"]::placeholder { color: var(--ink-dim); }
  select:focus, input:focus { outline: 1px solid var(--ink); border-color: var(--ink); }
  
  /* ===== QUICK FILTERS ===== */
  .quick-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
  }
  .qf-label {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }
  .qf {
    background: white;
    border: 1px solid var(--rule);
    padding: 5px 10px;
    font-size: 11px;
    font-family: var(--sans);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.1s;
  }
  .qf:hover { border-color: var(--ink); }
  .qf.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .qf.accent.active {
    background: var(--accent);
    border-color: var(--accent);
  }
  
  /* ===== RESULTS BAR ===== */
  .results-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
  }
  .results-count {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
  }
  .results-count .accent { color: var(--accent); }
  .results-count .label {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-left: 6px;
    font-weight: 400;
  }
  .results-bar-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .results-bar-right select {
    width: auto;
    padding: 4px 6px;
    font-size: 11px;
  }
  .btn-link {
    background: none;
    border: none;
    color: var(--ink);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    border-bottom: 1px solid var(--ink);
    padding: 0 0 1px 0;
  }
  .btn-link:hover { color: var(--accent); border-color: var(--accent); }
  .btn-primary {
    background: var(--ink);
    color: white;
    border: 1px solid var(--ink);
    padding: 7px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
  }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  
  /* ===== CARDS ===== */
  .grid { display: flex; flex-direction: column; }
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-bottom: none;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 110px 1fr 180px;
    gap: 20px;
    align-items: start;
    transition: background 0.1s;
  }
  .card:last-child { border-bottom: 1px solid var(--rule); }
  .card:hover { background: #fdfbf7; }
  .card.thumb-down { opacity: 0.45; }
  
  .deadline-block {
    border-right: 1px solid var(--rule);
    padding-right: 18px;
    text-align: left;
  }
  .deadline-status {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .deadline-status.closed { color: var(--accent); font-weight: 600; }
  .deadline-status.open { color: var(--green); font-weight: 600; }
  .deadline-status.soon { color: var(--accent); font-weight: 600; }
  .deadline-days {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
  }
  .deadline-days.green { color: var(--green); }
  .deadline-days.amber { color: var(--amber); }
  .deadline-days.red { color: var(--accent); }
  .deadline-days-label {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .deadline-date {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-family: var(--sans);
  }
  
  .card-body { min-width: 0; }
  .card-tags {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .tag.notice {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .tag.setaside {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .tag.setaside.none {
    background: #f0ede5;
    color: var(--ink-dim);
  }
  .tag.sector {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .card-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.25;
    color: var(--ink);
  }
  .card-agency {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .card-agency strong {
    color: var(--ink);
    font-weight: 600;
  }
  .card-meta-row {
    display: flex;
    gap: 18px;
    font-size: 11px;
    color: var(--ink-dim);
    flex-wrap: wrap;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .card-meta-row strong {
    color: var(--ink);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    font-size: 12px;
    margin-left: 4px;
  }
  .card-description {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .card.expanded .card-description { max-height: none; }
  
  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: stretch;
  }
  .btn-sam {
    background: var(--ink);
    color: white;
    border: 1px solid var(--ink);
    padding: 8px 12px;
    text-decoration: none;
    font-size: 11px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: var(--sans);
    font-weight: 500;
  }
  .btn-sam:hover { background: var(--accent); border-color: var(--accent); }
  .btn-action {
    background: white;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 7px 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--sans);
    cursor: pointer;
  }
  .btn-action:hover { border-color: var(--ink); }
  .rating-buttons {
    display: flex;
    gap: 6px;
  }
  .rating-buttons button {
    flex: 1;
    font-size: 16px;
    padding: 5px;
    background: white;
    border: 1px solid var(--rule);
    cursor: pointer;
    font-family: inherit;
  }
  .rating-buttons button:hover { border-color: var(--ink); }
  .rating-buttons .thumb-up.active {
    background: rgba(45, 106, 62, 0.08);
    border-color: var(--green);
  }
  .rating-buttons .thumb-down.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  
  /* ===== EMPTY / LOADING ===== */
  .empty, .loading {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 50px 30px;
    text-align: center;
  }
  .empty h3 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .empty p, .loading p {
    color: var(--ink-soft);
    font-size: 13px;
  }
  
  /* ===== PAGINATION ===== */
  #pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  #pagination button {
    min-width: 36px;
    padding: 7px 10px;
    font-size: 12px;
    background: white;
    border: 1px solid var(--rule);
    color: var(--ink);
    cursor: pointer;
    font-family: var(--sans);
  }
  #pagination button:hover:not(:disabled) { border-color: var(--ink); }
  #pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  #pagination button.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  #pagination span {
    color: var(--ink-dim);
    padding: 0 4px;
  }
  
  @media (max-width: 900px) {
    .card { grid-template-columns: 100px 1fr; }
    .card-actions { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; }
    .card-actions .btn-sam, .card-actions .btn-action, .rating-buttons { flex: 1; min-width: 120px; }
    .masthead { grid-template-columns: 1fr; }
    .masthead-meta { text-align: left; }
  }
</style>
</head>
<body>

<header class="masthead">
  <h1>Federal <em>Contracts</em><br>Dashboard</h1>
  <div class="masthead-meta">
    <div><span class="accent">SAM.GOV</span> · LIVE TRACKER</div>
    <div>UPDATED <strong id="lastRefresh">—</strong></div>
    <div>TOTAL RECORDS <strong id="totalCount">—</strong></div>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="controls">
  <div class="filters">
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="Title, agency, NAICS, solicitation #...">
    </div>
    <div class="filter-group">
      <label>Agency</label>
      <select id="agencyFilter"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Notice Type</label>
      <select id="noticeTypeFilter"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Set-Aside</label>
      <select id="setAsideFilter"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Sector</label>
      <select id="sectorFilter"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>State</label>
      <select id="stateFilter"><option value="">All</option></select>
    </div>
  </div>
  
  <div class="quick-filters">
    <span class="qf-label">View:</span>
    <button class="qf active" data-view="all">All</button>
    <button class="qf" data-view="open">Open Only</button>
    <button class="qf" data-view="closing">Closing ≤7 Days</button>
    <button class="qf" data-view="setasides">Set-Asides</button>
    <button class="qf accent" data-view="thumb_up">👍 Thumbs Up</button>
    <button class="qf" data-view="thumb_down">👎 Thumbs Down</button>
    <button class="qf" data-view="unrated">Unrated</button>
    <button class="btn-link" id="resetBtn" style="margin-left:auto">Reset Filters</button>
  </div>
</div>

<div class="results-bar">
  <div class="results-count">
    <span id="resultsNum" class="accent">—</span>
    <span class="label">contracts · <span id="paginationInfo"></span></span>
  </div>
  <div class="results-bar-right">
    <button class="btn-link" id="exportBtn">Export CSV</button>
    <span>Per Page
      <select id="perPage">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="all">All</option>
      </select>
    </span>
    <span>Sort
      <select id="sortBy">
        <option value="deadline_asc">Deadline (soonest)</option>
        <option value="deadline_desc">Deadline (latest)</option>
        <option value="posted_desc">Posted (newest)</option>
        <option value="posted_asc">Posted (oldest)</option>
        <option value="title_asc">Title (A-Z)</option>
      </select>
    </span>
    <button class="btn-primary" id="refreshBtn">↻ Refresh</button>
  </div>
</div>

<div id="grid" class="grid">
  <div class="loading"><p>Loading contracts from Supabase…</p></div>
</div>

<div id="pagination"></div>

<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'https://uiplzvlhihkrheflclou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RC22tCyni4kCUz3TaET2kw_lS_1V6yR';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
let allRows = [];
let ratingsMap = {};
let filteredRows = [];
let state = {
  page: 1,
  perPage: 50,
  view: 'all',
  expanded: new Set()
};

// ===== HELPERS =====
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function daysUntil(dateStr) {
  if (!dateStr) return 999;
  const d = new Date(dateStr);
  if (isNaN(d)) return 999;
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.floor((d - today) / 86400000);
}

function deadlineColor(days) {
  if (days < 0 || days >= 999) return 'red';
  if (days <= 7) return 'red';
  if (days <= 21) return 'amber';
  return 'green';
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toISOString().split('T')[0];
}

// ===== DATA LOADING =====
async function loadData() {
  document.getElementById('grid').innerHTML = '<div class="loading"><p>Loading contracts from Supabase…</p></div>';
  document.getElementById('lastRefresh').textContent = 'REFRESHING…';
  
  try {
    let contracts = [];
    let from = 0;
    const batchSize = 1000;
    while (true) {
      const { data, error } = await sb
        .from('contracts')
        .select('*')
        .range(from, from + batchSize - 1);
      if (error) throw error;
      contracts = contracts.concat(data);
      if (data.length < batchSize) break;
      from += batchSize;
    }
    
    const { data: ratings, error: rError } = await sb
      .from('ratings')
      .select('*');
    if (rError) throw rError;
    
    ratingsMap = {};
    ratings.forEach(r => { ratingsMap[r.notice_id] = r.rating; });
    
    allRows = contracts.map(c => ({
      ...c,
      days_left: daysUntil(c.deadline),
      rating: ratingsMap[c.notice_id] || null
    }));
    
    const now = new Date();
    document.getElementById('lastRefresh').textContent = 
      now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase() + 
      ' · ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    document.getElementById('totalCount').textContent = allRows.length.toLocaleString();
    
    populateFilters();
    render();
  } catch (err) {
    document.getElementById('grid').innerHTML = 
      `<div class="empty"><h3>Failed to load data</h3><p>${escapeHtml(err.message)}</p></div>`;
    document.getElementById('lastRefresh').textContent = 'ERROR';
    console.error(err);
  }
}

// ===== FILTER POPULATION =====
function populateFilters() {
  const fillSelect = (id, values) => {
    const sel = document.getElementById(id);
    const current = sel.value;
    sel.innerHTML = '<option value="">All</option>';
    [...new Set(values.filter(Boolean))].sort().forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v.length > 50 ? v.substring(0, 47) + '…' : v;
      opt.title = v;
      sel.appendChild(opt);
    });
    sel.value = current;
  };
  
  fillSelect('noticeTypeFilter', allRows.map(r => r.notice_type));
  fillSelect('setAsideFilter', allRows.map(r => r.set_aside));
  fillSelect('sectorFilter', allRows.map(r => r.sector));
  fillSelect('agencyFilter', allRows.map(r => r.agency));
  fillSelect('stateFilter', allRows.map(r => r.state));
}

// ===== FILTERING =====
function applyFilters() {
  let rows = [...allRows];
  
  const search = document.getElementById('searchInput').value.toLowerCase();
  if (search) {
    rows = rows.filter(r =>
      (r.title || '').toLowerCase().includes(search) ||
      (r.agency || '').toLowerCase().includes(search) ||
      (r.naics || '').toLowerCase().includes(search) ||
      (r.solicitation || '').toLowerCase().includes(search)
    );
  }
  
  const filterIds = ['noticeType', 'setAside', 'sector', 'agency', 'state'];
  const fields = ['notice_type', 'set_aside', 'sector', 'agency', 'state'];
  filterIds.forEach((f, i) => {
    const val = document.getElementById(f + 'Filter').value;
    if (val) rows = rows.filter(r => r[fields[i]] === val);
  });
  
  if (state.view === 'thumb_up') rows = rows.filter(r => r.rating === 'up');
  else if (state.view === 'thumb_down') rows = rows.filter(r => r.rating === 'down');
  else if (state.view === 'unrated') rows = rows.filter(r => !r.rating);
  else if (state.view === 'open') rows = rows.filter(r => r.days_left >= 0 && r.days_left < 999 && r.rating !== 'down');
  else if (state.view === 'closing') rows = rows.filter(r => r.days_left >= 0 && r.days_left <= 7 && r.rating !== 'down');
  else if (state.view === 'setasides') rows = rows.filter(r => r.set_aside && r.set_aside !== 'None' && r.rating !== 'down');
  else if (state.view === 'all') rows = rows.filter(r => r.rating !== 'down');
  
  const sortBy = document.getElementById('sortBy').value;
  rows.sort((a, b) => {
    if (sortBy === 'deadline_asc') return a.days_left - b.days_left;
    if (sortBy === 'deadline_desc') return b.days_left - a.days_left;
    if (sortBy === 'posted_desc') return (b.posted || '').localeCompare(a.posted || '');
    if (sortBy === 'posted_asc') return (a.posted || '').localeCompare(b.posted || '');
    if (sortBy === 'title_asc') return (a.title || '').localeCompare(b.title || '');
    return 0;
  });
  
  return rows;
}

// ===== STATS =====
function updateStats() {
  const total = allRows.length;
  const open = allRows.filter(r => r.days_left >= 0 && r.days_left < 999).length;
  const closingSoon = allRows.filter(r => r.days_left >= 0 && r.days_left <= 7).length;
  const setAsides = allRows.filter(r => r.set_aside && r.set_aside !== 'None').length;
  const thumbsUp = Object.values(ratingsMap).filter(r => r === 'up').length;
  const thumbsDown = Object.values(ratingsMap).filter(r => r === 'down').length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">Total Tracked</div>
      <div class="stat-value">${total.toLocaleString()}</div>
      <div class="stat-sub">All notices</div>
    </div>
    <div class="stat">
      <div class="stat-label">Open Now</div>
      <div class="stat-value">${open.toLocaleString()}</div>
      <div class="stat-sub">Active deadlines</div>
    </div>
    <div class="stat">
      <div class="stat-label">Closing ≤ 7 Days</div>
      <div class="stat-value accent">${closingSoon.toLocaleString()}</div>
      <div class="stat-sub">Act fast</div>
    </div>
    <div class="stat">
      <div class="stat-label">Set-Asides</div>
      <div class="stat-value">${setAsides.toLocaleString()}</div>
      <div class="stat-sub">Small biz eligible</div>
    </div>
  `;
}

// ===== RATING =====
async function setRating(noticeId, rating) {
  const current = ratingsMap[noticeId];
  
  try {
    if (current === rating) {
      await sb.from('ratings').delete().eq('notice_id', noticeId);
      delete ratingsMap[noticeId];
    } else {
      await sb.from('ratings').upsert({
        notice_id: noticeId,
        rating: rating,
        rated_at: new Date().toISOString()
      });
      ratingsMap[noticeId] = rating;
    }
    
    const row = allRows.find(r => r.notice_id === noticeId);
    if (row) row.rating = ratingsMap[noticeId] || null;
    
    updateStats();
    render();
  } catch (err) {
    alert('Failed to save rating: ' + err.message);
  }
}

// ===== RENDER =====
function render() {
  filteredRows = applyFilters();
  updateStats();
  
  const perPage = document.getElementById('perPage').value;
  const total = filteredRows.length;
  const itemsPerPage = perPage === 'all' ? total : parseInt(perPage);
  const totalPages = perPage === 'all' ? 1 : Math.ceil(total / itemsPerPage);
  if (state.page > totalPages) state.page = 1;
  
  const start = (state.page - 1) * itemsPerPage;
  const end = perPage === 'all' ? total : start + itemsPerPage;
  const pageRows = filteredRows.slice(start, end);
  
  document.getElementById('resultsNum').textContent = total.toLocaleString();
  document.getElementById('paginationInfo').textContent = 
    total === 0 ? 'no matches' : `showing ${start + 1}–${Math.min(end, total)} of ${total.toLocaleString()}`;
  
  const grid = document.getElementById('grid');
  
  if (total === 0) {
    grid.innerHTML = '<div class="empty"><h3>No contracts match.</h3><p>Adjust the filters or reset.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  
  grid.innerHTML = pageRows.map(r => {
    const dCls = deadlineColor(r.days_left);
    const isClosed = r.days_left < 0;
    const isTBD = r.days_left >= 999;
    const isSoon = !isClosed && !isTBD && r.days_left <= 7;
    const isOpen = !isClosed && !isTBD;
    
    let statusText = '';
    let statusClass = '';
    if (isClosed) { statusText = 'CLOSED'; statusClass = 'closed'; }
    else if (isTBD) { statusText = 'TBD'; statusClass = ''; }
    else if (isSoon) { statusText = 'CLOSING SOON'; statusClass = 'soon'; }
    else { statusText = 'OPEN'; statusClass = 'open'; }
    
    const dDisplay = isTBD ? '—' : (isClosed ? formatDate(r.deadline).split('-').slice(1).join('/') : r.days_left);
    const dLabel = isTBD ? 'No deadline' : (isClosed ? 'Past due' : (r.days_left === 1 ? 'day left' : 'days left'));
    
    const isExp = state.expanded.has(r.notice_id);
    const cardClass = r.rating === 'down' ? 'card thumb-down' : 'card';
    
    return `
      <article class="${cardClass} ${isExp?'expanded':''}" data-id="${r.notice_id}">
        <div class="deadline-block">
          <div class="deadline-status ${statusClass}">${statusText}</div>
          <div class="deadline-days ${dCls}">${dDisplay}</div>
          <div class="deadline-days-label">${dLabel}</div>
          <div class="deadline-date">${formatDate(r.deadline) || ''}</div>
        </div>
        <div class="card-body">
          <div class="card-tags">
            <span class="tag notice">${escapeHtml(r.notice_type || 'Unknown')}</span>
            <span class="tag setaside ${(r.set_aside === 'None' || !r.set_aside) ? 'none' : ''}">${escapeHtml(r.set_aside || 'None')}</span>
            <span class="tag sector">${escapeHtml(r.sector || 'N/A')}</span>
          </div>
          <h3 class="card-title">${escapeHtml(r.title)}</h3>
          <div class="card-agency"><strong>${escapeHtml(r.agency)}</strong></div>
          <div class="card-meta-row">
            <span>Sol#<strong>${escapeHtml(r.solicitation || '—')}</strong></span>
            <span>NAICS<strong>${escapeHtml(r.naics || '—')}</strong></span>
            ${r.state && r.state !== 'N/A' ? `<span>State<strong>${escapeHtml(r.state)}</strong></span>` : ''}
            <span>Posted<strong>${formatDate(r.posted) || '—'}</strong></span>
          </div>
          ${r.description ? `<div class="card-description">${escapeHtml(r.description)}</div>` : ''}
        </div>
        <div class="card-actions">
          <a href="${escapeHtml(r.sam_link)}" target="_blank" rel="noopener" class="btn-sam">Open SAM.gov →</a>
          <div class="rating-buttons">
            <button class="thumb-up ${r.rating === 'up' ? 'active' : ''}" onclick="setRating('${r.notice_id}', 'up')" title="Thumbs up">👍</button>
            <button class="thumb-down ${r.rating === 'down' ? 'active' : ''}" onclick="setRating('${r.notice_id}', 'down')" title="Thumbs down">👎</button>
          </div>
          ${r.description ? `<button class="btn-action" onclick="toggleExp('${r.notice_id}')">${isExp?'Hide Details':'Details'}</button>` : ''}
        </div>
      </article>
    `;
  }).join('');
  
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  
  let html = '';
  html += `<button ${state.page === 1 ? 'disabled' : ''} onclick="setPage(${state.page - 1})">← Prev</button>`;
  
  const maxButtons = 7;
  let startP = Math.max(1, state.page - Math.floor(maxButtons / 2));
  let endP = Math.min(totalPages, startP + maxButtons - 1);
  if (endP - startP < maxButtons - 1) startP = Math.max(1, endP - maxButtons + 1);
  
  if (startP > 1) html += `<button onclick="setPage(1)">1</button>${startP > 2 ? '<span>…</span>' : ''}`;
  for (let i = startP; i <= endP; i++) {
    html += `<button class="${i === state.page ? 'active' : ''}" onclick="setPage(${i})">${i}</button>`;
  }
  if (endP < totalPages) html += `${endP < totalPages - 1 ? '<span>…</span>' : ''}<button onclick="setPage(${totalPages})">${totalPages}</button>`;
  
  html += `<button ${state.page === totalPages ? 'disabled' : ''} onclick="setPage(${state.page + 1})">Next →</button>`;
  pag.innerHTML = html;
}

function setPage(n) {
  state.page = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleExp(id) {
  if (state.expanded.has(id)) state.expanded.delete(id);
  else state.expanded.add(id);
  render();
}

// ===== EVENT LISTENERS =====
['searchInput', 'noticeTypeFilter', 'setAsideFilter', 'sectorFilter', 'agencyFilter', 'stateFilter', 'sortBy', 'perPage']
  .forEach(id => {
    document.getElementById(id).addEventListener('input', () => { state.page = 1; render(); });
    document.getElementById(id).addEventListener('change', () => { state.page = 1; render(); });
  });

document.querySelectorAll('.qf').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.qf').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.view = t.dataset.view;
    state.page = 1;
    render();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  ['noticeTypeFilter', 'setAsideFilter', 'sectorFilter', 'agencyFilter', 'stateFilter'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('sortBy').value = 'deadline_asc';
  document.querySelectorAll('.qf').forEach(x => x.classList.remove('active'));
  document.querySelector('.qf[data-view="all"]').classList.add('active');
  state.view = 'all';
  state.page = 1;
  render();
});

document.getElementById('refreshBtn').addEventListener('click', loadData);

document.getElementById('exportBtn').addEventListener('click', () => {
  const headers = ['Title', 'Agency', 'Notice Type', 'Set-Aside', 'NAICS', 'Sector', 'State', 'Posted', 'Deadline', 'Days Left', 'Solicitation', 'Notice ID', 'Rating', 'SAM.gov Link'];
  const rows = filteredRows.map(r => [
    r.title, r.agency, r.notice_type, r.set_aside, r.naics, r.sector, r.state,
    formatDate(r.posted), formatDate(r.deadline), 
    r.days_left >= 999 ? 'TBD' : r.days_left,
    r.solicitation, r.notice_id, r.rating || '', r.sam_link
  ]);
  const csv = [headers.join(',')].concat(
    rows.map(r => r.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(','))
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'contracts_export_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
});

loadData();
</script>
