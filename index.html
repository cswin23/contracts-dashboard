<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage Ops — Contract Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#13211b; --paper:#f4f1e8; --card:#fffdf7; --line:#d9d2c0;
    --accent:#1d6a4f; --accent-d:#124433; --gold:#b8893b; --red:#9c3a2e;
    --muted:#6b6557; --shadow:0 1px 0 #e7e0cf,0 8px 24px -16px rgba(19,33,27,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);
    background-image:radial-gradient(circle at 1px 1px,rgba(19,33,27,.04) 1px,transparent 0);
    background-size:22px 22px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:28px 24px 80px}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:4px;flex-wrap:wrap;gap:12px}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;letter-spacing:-.5px;line-height:1}
  .brand .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--muted);margin-top:6px}
  .refresh{font-family:'IBM Plex Mono',monospace;font-size:12px;border:1.5px solid var(--ink);
    background:var(--card);padding:9px 16px;cursor:pointer;border-radius:2px;text-transform:uppercase;
    letter-spacing:1px;transition:.15s;display:flex;align-items:center;gap:8px}
  .refresh:hover{background:var(--ink);color:var(--paper)}
  .refresh:disabled{opacity:.5;cursor:wait}

  /* Tabs */
  .tabs{display:flex;gap:0;margin:22px 0 0}
  .tab{font-family:'Fraunces',serif;font-size:18px;font-weight:600;padding:11px 26px;cursor:pointer;
    background:transparent;border:1.5px solid var(--line);border-bottom:none;color:var(--muted);
    border-radius:6px 6px 0 0;position:relative;top:1.5px;transition:.15s}
  .tab .count{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:400;
    margin-left:8px;color:var(--gold)}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--card);color:var(--ink);border-color:var(--ink);border-bottom:1.5px solid var(--card)}
  .panel{border:1.5px solid var(--ink);background:var(--card);border-radius:0 6px 6px 6px;
    box-shadow:var(--shadow);padding:18px}

  /* Stats */
  .stats{display:flex;gap:26px;flex-wrap:wrap;padding:4px 4px 16px;border-bottom:1px dashed var(--line);margin-bottom:16px}
  .stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1}
  .stat .l{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);margin-top:4px}
  .stat.alert .n{color:var(--red)}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .controls input[type=text],.controls select{font-family:'IBM Plex Sans',sans-serif;font-size:13px;
    padding:8px 11px;border:1.5px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink)}
  .controls select{flex:0 0 auto;width:160px;text-overflow:ellipsis}
  .controls input[type=text]{flex:1 1 220px;min-width:180px;max-width:340px}
  .controls input:focus,.controls select:focus{outline:none;border-color:var(--accent)}
  .controls .ghost{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 13px;
    border:1.5px solid var(--line);background:var(--card);cursor:pointer;border-radius:3px;text-transform:uppercase;letter-spacing:1px}
  .controls .ghost:hover{border-color:var(--ink)}
  .controls .ghost.on{background:var(--gold);color:#fff;border-color:var(--gold)}
  .controls .spacer{flex:1}

  /* Multi-select filter dropdowns */
  .ms{position:relative;flex:0 0 auto;width:160px;font-family:'IBM Plex Sans',sans-serif}
  .ms-btn{width:100%;font-size:13px;padding:8px 11px;border:1.5px solid var(--line);border-radius:3px;
    background:var(--paper);color:var(--ink);cursor:pointer;text-align:left;display:flex;
    align-items:center;justify-content:space-between;gap:6px}
  .ms-btn:focus{outline:none;border-color:var(--accent)}
  .ms.open .ms-btn{border-color:var(--accent)}
  .ms-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ms-caret{flex:0 0 auto;color:var(--muted);font-size:10px}
  .ms-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:40;
    min-width:100%;width:max-content;max-width:320px;max-height:300px;overflow:auto;
    background:var(--card);border:1.5px solid var(--ink);border-radius:4px;
    box-shadow:0 8px 24px -14px rgba(19,33,27,.5);padding:6px}
  .ms.open .ms-menu{display:block}
  .ms-menu label{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;font-size:12.5px;
    cursor:pointer;border-radius:3px;line-height:1.35}
  .ms-menu label:hover{background:#faf7ee}
  .ms-menu input{margin-top:2px;flex:0 0 auto;accent-color:var(--accent)}
  .ms-clear{display:block;width:100%;text-align:left;font-family:'IBM Plex Mono',monospace;
    font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    background:none;border:none;border-bottom:1px solid var(--line);padding:4px 8px 8px;
    margin-bottom:4px;cursor:pointer}
  .ms-clear:hover{color:var(--red)}

  #tbl-federal,#tbl-indiana{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;min-width:1160px}
  col.c-title{width:19%} col.c-agency{width:16%} col.c-type{width:10%} col.c-set{width:14%}
  col.c-naics{width:7%} col.c-state{width:5%} col.c-posted{width:10%} col.c-deadline{width:12%}
  col.c-psc{width:13%}
  col.c-contact{width:20%} col.c-docs{width:8%} col.c-star{width:104px}
  thead th{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--ink);cursor:pointer;white-space:nowrap}
  thead th:hover{color:var(--ink)}
  tbody td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top;
    overflow-wrap:anywhere;word-break:break-word}
  th.col-star,td.col-star{width:104px;text-align:center;padding-left:4px;padding-right:4px}
  tbody tr:hover{background:#faf7ee}
  .t-title{font-weight:600}
  .t-title a{color:var(--accent-d);text-decoration:none;border-bottom:1px solid transparent}
  .t-title a:hover{border-bottom-color:var(--accent-d)}
  .t-desc{color:var(--muted);font-size:12px;margin-top:3px;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;
    border-radius:8px;background:#ece4d2;color:var(--accent-d);white-space:normal;max-width:100%;
    overflow-wrap:anywhere;line-height:1.4}
  .pill.sa{background:#efe3cb;color:var(--gold)}
  .pill.psc{background:#dde7ef;color:#2a4a63}
  .deadline{font-family:'IBM Plex Mono',monospace;white-space:nowrap}
  .dl-soon{color:var(--red);font-weight:600}
  .fav{cursor:pointer;font-size:18px;line-height:1;background:none;border:none;color:var(--line);transition:.15s}
  .fav:hover{color:var(--gold);transform:scale(1.15)}
  .fav.on{color:var(--gold)}
  .mono{font-family:'IBM Plex Mono',monospace;font-size:12px}
  .email{color:var(--accent-d);text-decoration:none}
  .email:hover{text-decoration:underline}

  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:10px}
  .pager{display:flex;gap:6px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px}
  .pager button{border:1.5px solid var(--line);background:var(--card);padding:5px 11px;cursor:pointer;border-radius:3px}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .pg-input{width:50px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;
    padding:5px 4px;border:1.5px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);
    margin:0 2px;-moz-appearance:textfield}
  .pager .pg-input::-webkit-outer-spin-button,.pager .pg-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .pager .pg-input:focus{outline:none;border-color:var(--accent)}
  .msg{padding:40px;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
  .err{color:var(--red)}
  .hidden{display:none}

  /* Row action buttons (log submission / dismiss) */
  .rowacts{display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap}
  .act{cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:3px;
    font-size:12px;line-height:1;padding:3px 5px;color:var(--muted);transition:.12s}
  .act.sub:hover{border-color:var(--accent);color:var(--accent)}
  .act.sub.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .act.dis:hover{border-color:var(--red);color:var(--red)}
  .act.res:hover{border-color:var(--accent);color:var(--accent)}

  /* Submission cards */
  #tbl-submissions{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
  .scard{border:1.5px solid var(--line);border-radius:6px;background:var(--paper);padding:16px 16px 12px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
  .scard-h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .src-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:2px 6px;border-radius:8px;margin-right:8px;vertical-align:middle}
  .src-tag.federal{background:#dce8e1;color:var(--accent-d)}
  .src-tag.indiana{background:#efe3cb;color:var(--gold)}
  .scard-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--accent-d);
    text-decoration:none;border-bottom:1px solid transparent}
  .scard-title:hover{border-bottom-color:var(--accent-d)}
  .scard-agency{font-size:12px;color:var(--muted);margin-top:3px}
  .scard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .scard label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);display:flex;flex-direction:column;gap:4px}
  .scard input,.scard select,.scard textarea{font-family:'IBM Plex Sans',sans-serif;font-size:13px;
    padding:7px 9px;border:1.5px solid var(--line);border-radius:3px;background:var(--card);color:var(--ink);
    text-transform:none;letter-spacing:0}
  .scard input:focus,.scard select:focus,.scard textarea:focus{outline:none;border-color:var(--accent)}
  .scard-notes{grid-column:1/-1}
  .scard textarea{resize:vertical}
  .scard-foot{display:flex;justify-content:space-between;align-items:center;font-family:'IBM Plex Mono',monospace;
    font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .scard-foot .saved{color:var(--accent)}
  .attach-soon{opacity:.6}
  @media(max-width:520px){#tbl-submissions{grid-template-columns:1fr}}

  @media(max-width:720px){.t-desc{display:none}.brand h1{font-size:24px}}
  /* Description expander button in title cell */
  /* Fresh-listing indicators */
  .new-badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;
    letter-spacing:.5px;margin-top:5px;padding:2px 7px;border-radius:8px;background:var(--accent);color:#fff}
  tr.row-new td:first-child{box-shadow:inset 3px 0 0 var(--accent)}

  /* Description trigger pill under the title */
  .desc-pill{display:inline-flex;align-items:center;gap:5px;margin-top:7px;cursor:pointer;
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 9px;border-radius:8px;background:#e3ede7;color:var(--accent-d);
    border:1px solid var(--line);transition:.15s}
  .desc-pill:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Slide-in description drawer */
  .drawer-overlay{position:fixed;inset:0;background:rgba(19,33,27,.35);opacity:0;
    pointer-events:none;transition:opacity .2s;z-index:50}
  .drawer-overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(560px,86vw);background:var(--card);
    border-left:1.5px solid var(--ink);box-shadow:-12px 0 32px -20px rgba(19,33,27,.5);
    transform:translateX(100%);transition:transform .22s ease;z-index:51;
    display:flex;flex-direction:column;padding:22px 24px}
  .drawer.open{transform:translateX(0)}
  .drawer-h{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .drawer-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;line-height:1.3;color:var(--ink)}
  .drawer-x{border:none;background:none;cursor:pointer;font-size:22px;line-height:1;color:var(--muted)}
  .drawer-x:hover{color:var(--ink)}
  .drawer-meta{font-size:12px;color:var(--muted);margin:6px 0 16px}
  .drawer-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .drawer-body{flex:1;overflow:auto;border:1px solid var(--line);border-radius:4px;padding:14px;
    font-size:13.5px;line-height:1.6;color:var(--ink);white-space:pre-wrap;word-break:break-word;background:var(--paper)}
  .drawer-acts{display:flex;gap:8px;margin-top:14px}
  .drawer-acts a,.drawer-acts button{font-family:'IBM Plex Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:1px;padding:8px 13px;border:1.5px solid var(--line);
    background:var(--card);cursor:pointer;border-radius:3px;color:var(--ink);text-decoration:none;
    display:inline-flex;align-items:center;gap:6px}
  .drawer-acts a:hover,.drawer-acts button:hover{border-color:var(--ink)}
  .drawer-acts button.copied{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Contract Tracker</h1>
      <div class="sub">Vantage Ops Group · Federal &amp; Indiana State</div>
    </div>
    <button class="refresh" id="refreshBtn">↻ Refresh</button>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="federal">Federal <span class="count" id="cnt-federal"></span></button>
    <button class="tab" data-tab="indiana">Indiana State <span class="count" id="cnt-indiana"></span></button>
    <button class="tab" data-tab="submissions">Submissions <span class="count" id="cnt-submissions"></span></button>
  </div>

  <div class="panel">
    <!-- ===== FEDERAL ===== -->
    <section id="federal">
      <div class="stats" id="stats-federal"></div>
      <div class="controls">
        <input type="text" id="q-federal" placeholder="Search title, agency, NAICS…">
        <div class="ms" id="f-type" data-key="notice_type" data-all="All notice types"><button type="button" class="ms-btn"><span class="ms-txt">All notice types</span><span class="ms-caret">▾</span></button><div class="ms-menu"></div></div>
        <div class="ms" id="f-setaside" data-key="set_aside" data-all="All set-asides"><button type="button" class="ms-btn"><span class="ms-txt">All set-asides</span><span class="ms-caret">▾</span></button><div class="ms-menu"></div></div>
        <div class="ms" id="f-sector" data-key="sector" data-all="All sectors"><button type="button" class="ms-btn"><span class="ms-txt">All sectors</span><span class="ms-caret">▾</span></button><div class="ms-menu"></div></div>
        <div class="ms" id="f-state" data-key="state" data-all="All states"><button type="button" class="ms-btn"><span class="ms-txt">All states</span><span class="ms-caret">▾</span></button><div class="ms-menu"></div></div>
        <button class="ghost" id="fav-federal">★ Favorites</button>
        <button class="ghost" id="exp-federal" title="Also show past-due opportunities">⏷ Expired</button>
        <button class="ghost" id="dis-federal" title="Also show items marked not a fit">⤺ Dismissed</button>
        <div class="spacer"></div>
        <button class="ghost" id="csv-federal">⤓ CSV</button>
      </div>
      <div id="tbl-federal"></div>
      <div class="foot" id="foot-federal"></div>
    </section>

    <!-- ===== INDIANA ===== -->
    <section id="indiana" class="hidden">
      <div class="stats" id="stats-indiana"></div>
      <div class="controls">
        <input type="text" id="q-indiana" placeholder="Search title, agency, description…">
        <select id="i-agency"><option value="">All agencies</option></select>
        <button class="ghost" id="fav-indiana">★ Favorites</button>
        <button class="ghost" id="exp-indiana" title="Also show past-due opportunities">⏷ Expired</button>
        <button class="ghost" id="dis-indiana" title="Also show items marked not a fit">⤺ Dismissed</button>
        <div class="spacer"></div>
        <button class="ghost" id="csv-indiana">⤓ CSV</button>
      </div>
      <div id="tbl-indiana"></div>
      <div class="foot" id="foot-indiana"></div>
    </section>

    <!-- ===== SUBMISSIONS ===== -->
    <section id="submissions" class="hidden">
      <div class="stats" id="stats-submissions"></div>
      <div id="tbl-submissions"></div>
    </section>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — your Supabase project. The publishable key is safe
//  to expose in frontend code (it only allows what your RLS
//  policies permit). Do NOT paste the secret key here.
// ============================================================
const SUPABASE_URL = "https://uiplzvlhihkrheflclou.supabase.co";
const SUPABASE_KEY = "sb_publishable_RC22tCyni4kCUz3TaET2kw_lS_1V6yR";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PAGE = 50;
const state = {
  federal:{ rows:[], view:[], page:1, sortKey:"deadline", sortDir:1, favOnly:false },
  indiana:{ rows:[], view:[], page:1, sortKey:"response_due_by", sortDir:1, favOnly:false }
};

// Dismissed listings + view toggles, per tab. Dismissed items live in the
// Supabase `dismissed` table (keyed source+item_id) so daily scraper runs
// never wipe them — same integrity model as favorites.
const hidden = {
  federal:{ dismissed:new Set(), showExpired:false, showDismissed:false },
  indiana:{ dismissed:new Set(), showExpired:false, showDismissed:false }
};
// Which contracts already have a submission logged (so we never hide them
// and can show the ＋ button as "logged").
const submittedIds = { federal:new Set(), indiana:new Set() };
let submissions = [];
const SUB_STATUSES = ["Preparing","Submitted","Won","Lost","Withdrawn"];

const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const today = new Date();
function fmtDate(d){ if(!d) return "—"; const x=new Date(d); if(isNaN(x)) return esc(d);
  return x.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function daysLeft(d){ if(!d) return null; const x=new Date(d); if(isNaN(x)) return null;
  return Math.ceil((x-today)/864e5); }
// "new" = posted within the last NEW_DAYS days. One-line tweak to change the window.
const NEW_DAYS = 2;
function isNew(d){ if(!d) return false; const x=new Date(d); if(isNaN(x)) return false;
  const age=(today-x)/864e5; return age>=0 && age<=NEW_DAYS; }

// ---------- PSC code -> title lookup (loaded once from `psc_codes` table) ----------
const pscTitles = {};
async function loadPscTitles(){
  try{
    let from=0;
    while(true){
      const {data,error}=await sb.from("psc_codes").select("code,title").range(from,from+999);
      if(error) throw error;
      if(!data || !data.length) break;
      data.forEach(r=>{ if(r.code) pscTitles[String(r.code).trim().toUpperCase()]=r.title; });
      if(data.length<1000) break;
      from+=1000;
    }
  }catch(e){ console.warn("PSC titles not loaded (psc_codes table missing or empty):",e.message); }
}
// Render a PSC pill: "CODE - TITLE" when the title is known, else just the code.
function pscPill(code){
  if(!code) return "—";
  const c=String(code).trim().toUpperCase();
  const t=pscTitles[c];
  const label = t ? (c+" - "+t) : c;
  return '<span class="pill psc" title="'+esc(label)+'">'+esc(label)+'</span>';
}

// ---------- TABS ----------
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const tab=t.dataset.tab;
  ["federal","indiana","submissions"].forEach(id=>
    document.getElementById(id).classList.toggle("hidden",id!==tab));
}));

// ---------- expired helper ----------
// A row is expired if its deadline is strictly in the past.
function isExpired(tab,r){
  const d = tab==="federal" ? r.deadline : r.response_due_by;
  const dl = daysLeft(d);
  return dl!==null && dl<0;
}

// ============================================================
//  FEDERAL  (reads from `contracts` table)
// ============================================================
async function loadFederal(){
  const box=document.getElementById("tbl-federal");
  box.innerHTML='<div class="msg">Loading federal contracts…</div>';
  // Pull all rows in pages of 1000 (Supabase default cap)
  let all=[], from=0;
  try{
    while(true){
      const {data,error}=await sb.from("contracts").select("*").range(from,from+999);
      if(error) throw error;
      all=all.concat(data);
      if(data.length<1000) break;
      from+=1000;
    }
  }catch(e){ box.innerHTML='<div class="msg err">Could not load federal contracts: '+esc(e.message)+
    '<br><br>Check that RLS read policy is enabled on the <b>contracts</b> table.</div>'; return; }
  state.federal.rows=all;
  document.getElementById("cnt-federal").textContent=all.length;
  buildFederalFilters(all);
  renderFederal();
}
// Selected values per federal filter (empty set = "all").
const fedFilters = { notice_type:new Set(), set_aside:new Set(), sector:new Set(), state:new Set() };
function updateMsLabel(ms){
  const sel=fedFilters[ms.dataset.key], txt=ms.querySelector(".ms-txt");
  if(sel.size===0) txt.textContent=ms.dataset.all;
  else if(sel.size===1) txt.textContent=[...sel][0];
  else txt.textContent=sel.size+" selected";
}
function buildFederalFilters(rows){
  document.querySelectorAll("#federal .ms").forEach(ms=>{
    const key=ms.dataset.key, sel=fedFilters[key];

      '<button type="button" class="ms-clear">Clear</button>'+

        '><span>'+esc(v)+'</span></label>').join("");

  });
}
function federalFilter(){
  const q=document.getElementById("q-federal").value.toLowerCase();
  const favs=getFavs("federal");
  state.federal.view=state.federal.rows.filter(r=>{
    if(fedFilters.notice_type.size && !fedFilters.notice_type.has(r.notice_type)) return false;
    if(fedFilters.set_aside.size && !fedFilters.set_aside.has(r.set_aside)) return false;
    if(fedFilters.sector.size && !fedFilters.sector.has(r.sector)) return false;
    if(fedFilters.state.size && !fedFilters.state.has(r.state)) return false;
    if(state.federal.favOnly&&!favs.has(r.notice_id)) return false;
    // hide dismissed unless "Dismissed" toggle is on
    if(!hidden.federal.showDismissed && hidden.federal.dismissed.has(r.notice_id)) return false;
    // hide expired unless toggle on — but never hide favorited or submitted
    if(!hidden.federal.showExpired && isExpired("federal",r)
       && !favs.has(r.notice_id) && !submittedIds.federal.has(r.notice_id)) return false;
    if(q){ const h=(r.title+" "+r.agency+" "+r.naics+" "+(r.solicitation||"")).toLowerCase();
      if(!h.includes(q)) return false; }
    return true;
  });
  sortRows("federal"); state.federal.page=1; renderFederal();
}

      '<td>'+esc(r.agency)+'</td>'+
      '<td>'+pscPill(r.psc)+'</td>'+
      '<td>'+(r.notice_type?'<span class="pill">'+esc(r.notice_type)+'</span>':'—')+'</td>'+
      '<td>'+(r.set_aside?'<span class="pill sa">'+esc(r.set_aside)+'</span>':'—')+'</td>'+
      '<td class="mono">'+esc(r.naics||"—")+'</td>'+

      '</td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById("tbl-federal").innerHTML=h;
  document.getElementById("foot-federal").innerHTML=footer("federal");
  wireFavButtons("federal");
}

// ---------- shared helpers ----------
function stat(n,l,cls=""){return '<div class="stat '+cls+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function th(tab,key,label){const s=state[tab];const arrow=s.sortKey===key?(s.sortDir>0?" ↑":" ↓"):"";
  return '<th data-sort="'+key+'" data-tab="'+tab+'">'+label+arrow+'</th>';}
function footer(tab){const s=state[tab];const pages=Math.max(1,Math.ceil(s.view.length/PAGE));
  const atStart=s.page<=1, atEnd=s.page>=pages;
  return '<div class="mono" style="color:var(--muted)">Showing '+
    Math.min((s.page-1)*PAGE+1,s.view.length)+'–'+Math.min(s.page*PAGE,s.view.length)+' of '+s.view.length+'</div>'+
    '<div class="pager">'+
    '<button '+(atStart?"disabled":"")+' data-pg="first" data-tab="'+tab+'" title="First page">« First</button>'+
    '<button '+(atStart?"disabled":"")+' data-pg="prev" data-tab="'+tab+'">‹ Prev</button>'+
    '<span>Page <input class="pg-input" type="number" min="1" max="'+pages+'" value="'+s.page+'" data-tab="'+tab+'" aria-label="Page number"> / '+pages+'</span>'+
    '<button '+(atEnd?"disabled":"")+' data-pg="next" data-tab="'+tab+'">Next ›</button>'+
    '<button '+(atEnd?"disabled":"")+' data-pg="last" data-tab="'+tab+'" title="Last page">Last »</button>'+
    '</div>';}
function sortRows(tab){const s=state[tab];const k=s.sortKey;
  s.view.sort((a,b)=>{let x=a[k],y=b[k];
    if(k==="deadline"||k==="response_due_by"||k==="posted"){x=new Date(x||"2999");y=new Date(y||"2999");}
    else{x=String(x||"").toLowerCase();y=String(y||"").toLowerCase();}
    return x<y?-1*s.sortDir:x>y?1*s.sortDir:0;});}

// jump to a typed page number (clamped to valid range)
function jumpToPage(inp){
  const tab=inp.dataset.tab,s=state[tab];
  const pages=Math.max(1,Math.ceil(s.view.length/PAGE));
  let n=parseInt(inp.value,10);
  if(isNaN(n)) n=s.page;
  s.page=Math.min(pages,Math.max(1,n));
  tab==="federal"?renderFederal():renderIndiana();
}

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-sort]");
  if(t){const tab=t.dataset.tab,s=state[tab];
    if(s.sortKey===t.dataset.sort)s.sortDir*=-1;else{s.sortKey=t.dataset.sort;s.sortDir=1;}
    sortRows(tab); tab==="federal"?renderFederal():renderIndiana(); return;}
  const p=e.target.closest("[data-pg]");
  if(p){const tab=p.dataset.tab,s=state[tab];
    const pages=Math.max(1,Math.ceil(s.view.length/PAGE));
    const act=p.dataset.pg;
    if(act==="first")s.page=1;
    else if(act==="last")s.page=pages;
    else if(act==="next")s.page=Math.min(pages,s.page+1);
    else if(act==="prev")s.page=Math.max(1,s.page-1);
    tab==="federal"?renderFederal():renderIndiana();}
});
// page-number input: jump on Enter, and on blur/change
document.addEventListener("keydown",e=>{
  const inp=e.target.closest(".pg-input");
  if(inp && e.key==="Enter"){ e.preventDefault(); jumpToPage(inp); inp.blur(); }
});
document.addEventListener("change",e=>{
  const inp=e.target.closest(".pg-input");
  if(inp){ jumpToPage(inp); }
});

// ---------- favorites ----------
// Indiana favorites persist in Supabase (indiana_favorites table).
// Federal favorites use localStorage for now — we can move them to a
// Supabase table once we confirm how the federal side should store them.
function getFavs(tab){
  if(tab==="federal") return new Set(JSON.parse(localStorage.getItem("fed_favs")||"[]"));
  return new Set(state.indiana.rows.filter(r=>r.is_favorited).map(r=>r.event_id));
}
function wireFavButtons(tab){
  document.querySelectorAll('#'+tab+' .fav').forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const id=btn.dataset.id;
      if(tab==="federal"){
        const favs=new Set(JSON.parse(localStorage.getItem("fed_favs")||"[]"));
        favs.has(id)?favs.delete(id):favs.add(id);
        localStorage.setItem("fed_favs",JSON.stringify([...favs]));
        renderFederal();
      }else{
        const row=state.indiana.rows.find(r=>r.event_id===id);
        const now=!row.is_favorited;
        btn.classList.toggle("on",now); row.is_favorited=now; // optimistic
        try{
          if(now){ await sb.from("indiana_favorites").insert({event_id:id}); }
          else{ await sb.from("indiana_favorites").delete().eq("event_id",id); }
        }catch(err){ row.is_favorited=!now; btn.classList.toggle("on",!now);
          alert("Couldn't save favorite — check RLS policies on indiana_favorites.\n"+err.message); }
        renderIndiana();
      }
    });
  });
}
["fav-federal","fav-indiana"].forEach(id=>{
  document.getElementById(id).addEventListener("click",e=>{
    const tab=id.split("-")[1]; state[tab].favOnly=!state[tab].favOnly;
    e.target.classList.toggle("on",state[tab].favOnly);
    tab==="federal"?federalFilter():indianaFilter();
  });
});

// ---------- row action buttons (dismiss / log submission) ----------
function rowActions(tab,id,favBtnHtml){
  const dismissed=hidden[tab].dismissed.has(id);
  const submitted=submittedIds[tab].has(id);
  let h='<div class="rowacts">'+favBtnHtml;
  h+='<button class="act sub'+(submitted?' on':'')+'" data-act="sub" data-id="'+esc(id)+'" data-tab="'+tab+'" title="'+
     (submitted?'Logged — open Submissions':'Log a submission')+'">＋</button>';
  if(dismissed)
    h+='<button class="act res" data-act="restore" data-id="'+esc(id)+'" data-tab="'+tab+'" title="Restore">↩</button>';
  else
    h+='<button class="act dis" data-act="dismiss" data-id="'+esc(id)+'" data-tab="'+tab+'" title="Not a fit — hide">✕</button>';
  return h+'</div>';
}

// ---------- dismissed (Supabase `dismissed` table) ----------
async function loadDismissed(){
  try{
    const {data,error}=await sb.from("dismissed").select("*");
    if(error) throw error;
    hidden.federal.dismissed=new Set(data.filter(d=>d.source==="federal").map(d=>d.item_id));
    hidden.indiana.dismissed=new Set(data.filter(d=>d.source==="indiana").map(d=>d.item_id));
  }catch(e){ console.warn("Could not load dismissed list:",e.message); }
}

// ---------- submissions (Supabase `submissions` table) ----------
async function loadSubmissions(){
  try{
    const {data,error}=await sb.from("submissions").select("*").order("updated_at",{ascending:false});
    if(error) throw error;
    submissions=data;
    submittedIds.federal=new Set(data.filter(d=>d.source==="federal").map(d=>d.item_id));
    submittedIds.indiana=new Set(data.filter(d=>d.source==="indiana").map(d=>d.item_id));
    document.getElementById("cnt-submissions").textContent=data.length;
  }catch(e){ console.warn("Could not load submissions:",e.message); }
}
async function logSubmission(tab,id){
  if(submittedIds[tab].has(id)){ document.querySelector('.tab[data-tab="submissions"]').click(); return; }
  const row = tab==="federal"
    ? state.federal.rows.find(r=>r.notice_id===id)
    : state.indiana.rows.find(r=>r.event_id===id);
  const rec={ source:tab, item_id:id,
    title: row?row.title:"",
    agency: row?row.agency:"",
    link: tab==="federal" ? (row&&row.sam_link||"") : (row&&row.bid_docs_url||""),
    status:"Preparing" };
  try{
    const {data,error}=await sb.from("submissions").insert(rec).select();
    if(error) throw error;
    submissions.unshift(data[0]); submittedIds[tab].add(id);
    document.getElementById("cnt-submissions").textContent=submissions.length;
    renderSubmissions();
    tab==="federal"?renderFederal():renderIndiana();
    document.querySelector('.tab[data-tab="submissions"]').click();
  }catch(e){ alert("Couldn't log submission — check RLS policies on the submissions table.\n"+e.message); }
}
function subStats(){
  const by=s=>submissions.filter(x=>x.status===s).length;
  document.getElementById("stats-submissions").innerHTML=
    stat(submissions.length,"Tracked")+stat(by("Submitted"),"Submitted")+
    stat(by("Won"),"Won")+stat(by("Lost"),"Lost","alert");
}
function renderSubmissions(){
  const box=document.getElementById("tbl-submissions");
  if(!submissions.length){
    document.getElementById("stats-submissions").innerHTML="";
    box.innerHTML='<div class="msg">No submissions logged yet. On the Federal or Indiana tab, '+
      'click the ＋ button on a contract to start tracking it here.</div>';
    return;
  }
  subStats();
  box.innerHTML=submissions.map(s=>{
    const opts=SUB_STATUSES.map(o=>'<option '+(s.status===o?'selected':'')+'>'+o+'</option>').join("");
    return '<div class="scard" data-sid="'+esc(s.id)+'">'+
      '<div class="scard-h"><div>'+
        '<span class="src-tag '+esc(s.source)+'">'+esc(s.source)+'</span>'+
        '<a class="scard-title" href="'+esc(s.link||"#")+'" target="_blank">'+esc(s.title||"(untitled)")+'</a>'+
        '<div class="scard-agency">'+esc(s.agency||"")+'</div>'+
      '</div><button class="act dis" data-del="'+esc(s.id)+'" title="Remove from submissions">✕</button></div>'+
      '<div class="scard-grid">'+
        '<label>Status<select data-f="status">'+opts+'</select></label>'+
        '<label>Date submitted<input type="date" data-f="date_submitted" value="'+esc(s.date_submitted||"")+'"></label>'+
        '<label>Bid amount<input type="number" step="0.01" data-f="bid_amount" value="'+(s.bid_amount??"")+'" placeholder="0.00"></label>'+
        '<label>&nbsp;</label>'+
      '</div>'+
      '<label class="scard-notes">Notes<textarea data-f="notes" rows="3" placeholder="POC, next steps, internal notes…">'+esc(s.notes||"")+'</textarea></label>'+
      '<div class="scard-foot"><span class="saved" data-saved></span>'+
        '<span class="attach-soon">📎 Attachments — coming soon</span></div>'+
    '</div>';
  }).join("");
}

// save card edits (status / date / amount / notes) back to Supabase
document.addEventListener("change",async e=>{
  const f=e.target.closest("[data-f]"); if(!f) return;
  const card=f.closest(".scard"); if(!card) return;
  const sid=card.dataset.sid, field=f.dataset.f; let val=f.value;
  if(field==="bid_amount") val = val===""?null:Number(val);
  if(field==="date_submitted" && val==="") val=null;
  const patch={updated_at:new Date().toISOString()}; patch[field]=val;
  const tag=card.querySelector("[data-saved]"); if(tag) tag.textContent="Saving…";
  try{
    const {error}=await sb.from("submissions").update(patch).eq("id",sid);
    if(error) throw error;
    const rec=submissions.find(x=>x.id===sid); if(rec) Object.assign(rec,patch);
    if(tag) tag.textContent="Saved ✓";
    if(field==="status") subStats();
  }catch(err){ if(tag) tag.textContent="Save failed"; alert("Couldn't save: "+err.message); }
});

// dismiss / restore / log-submission / delete-submission (delegated)
document.addEventListener("click",async e=>{
  const del=e.target.closest("[data-del]");
  if(del){
    if(!confirm("Remove this from your submissions log? The contract itself stays in its tab.")) return;
    const sid=del.dataset.del, rec=submissions.find(x=>x.id===sid);
    try{
      const {error}=await sb.from("submissions").delete().eq("id",sid); if(error) throw error;
      submissions=submissions.filter(x=>x.id!==sid);
      if(rec) submittedIds[rec.source].delete(rec.item_id);
      document.getElementById("cnt-submissions").textContent=submissions.length;
      renderSubmissions(); renderFederal(); renderIndiana();
    }catch(err){ alert("Couldn't remove: "+err.message); }
    return;
  }
  const a=e.target.closest("[data-act]"); if(!a) return;
  const tab=a.dataset.tab, id=a.dataset.id, act=a.dataset.act;
  if(act==="dismiss"){
    hidden[tab].dismissed.add(id);
    try{ await sb.from("dismissed").insert({source:tab,item_id:id}); }catch(_){}
    tab==="federal"?federalFilter():indianaFilter();
  }else if(act==="restore"){
    hidden[tab].dismissed.delete(id);
    try{ await sb.from("dismissed").delete().eq("source",tab).eq("item_id",id); }catch(_){}
    tab==="federal"?federalFilter():indianaFilter();
  }else if(act==="sub"){
    await logSubmission(tab,id);
  }
});

// expired / dismissed view toggles
[["exp-federal","federal","showExpired",()=>federalFilter()],
 ["dis-federal","federal","showDismissed",()=>federalFilter()],
 ["exp-indiana","indiana","showExpired",()=>indianaFilter()],
 ["dis-indiana","indiana","showDismissed",()=>indianaFilter()]].forEach(([id,tab,key,fn])=>{
  const b=document.getElementById(id); if(!b) return;
  b.addEventListener("click",()=>{ hidden[tab][key]=!hidden[tab][key];
    b.classList.toggle("on",hidden[tab][key]); fn(); });
});

// ---------- CSV ----------
function exportCSV(tab){
  const rows=state[tab].view;
  if(!rows.length){alert("Nothing to export.");return;}
  const cols=Object.keys(rows[0]);
  const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>'"'+String(r[c]??"").replace(/"/g,'""')+'"').join(","))).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=tab+"_contracts_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
}
document.getElementById("csv-federal").addEventListener("click",()=>exportCSV("federal"));
document.getElementById("csv-indiana").addEventListener("click",()=>exportCSV("indiana"));

// ---------- search / filter wiring ----------
document.getElementById("q-federal").addEventListener("input",federalFilter);
["q-indiana","i-agency"].forEach(id=>
  document.getElementById(id).addEventListener("input",indianaFilter));

// multi-select dropdowns (federal filters): open/close, checkbox toggle, clear
document.querySelectorAll("#federal .ms").forEach(ms=>{
  ms.querySelector(".ms-btn").addEventListener("click",e=>{
    e.stopPropagation();
    const wasOpen=ms.classList.contains("open");
    document.querySelectorAll("#federal .ms.open").forEach(o=>o.classList.remove("open"));
    ms.classList.toggle("open",!wasOpen);
  });
  ms.addEventListener("change",e=>{
    const cb=e.target.closest('input[type="checkbox"]'); if(!cb) return;
    const sel=fedFilters[ms.dataset.key];
    cb.checked ? sel.add(cb.value) : sel.delete(cb.value);
    updateMsLabel(ms); federalFilter();
  });
  ms.addEventListener("click",e=>{
    if(!e.target.closest(".ms-clear")) return;
    fedFilters[ms.dataset.key].clear();
    ms.querySelectorAll('input[type="checkbox"]').forEach(c=>c.checked=false);
    updateMsLabel(ms); federalFilter();
  });
});
// click outside any open menu closes it
document.addEventListener("click",e=>{
  if(!e.target.closest("#federal .ms"))
    document.querySelectorAll("#federal .ms.open").forEach(o=>o.classList.remove("open"));
});

// ---------- refresh ----------
document.getElementById("refreshBtn").addEventListener("click",async function(){
  this.disabled=true; this.textContent="↻ Refreshing…";
  await Promise.all([loadFederal(),loadIndiana()]);
  this.disabled=false; this.textContent="↻ Refresh";
});

// ---------- init ----------
(async function(){
  await Promise.all([loadDismissed(), loadSubmissions(), loadPscTitles()]);
  await loadFederal();
  sortRows("federal"); federalFilter();
  await loadIndiana();
  sortRows("indiana"); indianaFilter();
  renderSubmissions();
})();
</script>
<div class="drawer-overlay" id="descOverlay"></div>
<div class="drawer" id="descDrawer" role="dialog" aria-label="Contract description">
  <div class="drawer-h">
    <div class="drawer-title" id="descTitle"></div>
    <button class="drawer-x" id="descClose" aria-label="Close">&times;</button>
  </div>
  <div class="drawer-meta" id="descMeta"></div>
  <div class="drawer-label">Description</div>
  <div class="drawer-body" id="descBody"></div>
  <div class="drawer-acts">
    <button id="descCopy"><span>⧉</span> Copy</button>
    <a id="descSam" href="#" target="_blank">↗ Open in SAM</a>
  </div>
</div>

<script>
// ---------- description drawer (lazy-loads from `descriptions` table) ----------
const descCache = {};                 // notice_id -> plain text (or null)
let descCurrentText = "";

// turn SAM's stored description (JSON-wrapped, escaped, or HTML) into clean,
// copy-friendly plain text
function htmlToText(raw){
  if(!raw) return "";
  let t = raw;
  // 1. SAM returns {"description":"..."} — unwrap it (JSON.parse decodes \n, \t too)
  try{ const o=JSON.parse(raw); if(o && typeof o.description==="string") t=o.description; }catch(e){}
  // 2. safety net: if escapes survived as literal backslash sequences, decode them
  if(/\\n|\\t|\\r/.test(t)){
    t=t.replace(/\\r\\n|\\r|\\n/g,"\n").replace(/\\t/g,"\t").replace(/\\"/g,'"').replace(/\\\\/g,"\\");
  }
  // 3. strip any HTML tags that may be embedded
  t=t.replace(/<\s*br\s*\/?>/gi,"\n")
     .replace(/<\/\s*(p|div|li|tr|h[1-6])\s*>/gi,"\n")
     .replace(/<\s*li[^>]*>/gi,"• ")
     .replace(/<[^>]+>/g,"");
  // 4. decode HTML entities
  const ta=document.createElement("textarea"); ta.innerHTML=t; t=ta.value;
  // 5. tidy whitespace (collapse tabs/runs of spaces, trim blank lines)
  return t.replace(/[ \t]+/g," ").replace(/ *\n */g,"\n").replace(/\n{3,}/g,"\n\n").trim();
}

function openDrawer(){ document.getElementById("descOverlay").classList.add("open");
  document.getElementById("descDrawer").classList.add("open"); }
function closeDrawer(){ document.getElementById("descOverlay").classList.remove("open");
  document.getElementById("descDrawer").classList.remove("open"); }

async function showDescription(noticeId){
  const r = state.federal.rows.find(x=>x.notice_id===noticeId) || {};
  document.getElementById("descTitle").textContent = r.title || "Contract";
  document.getElementById("descMeta").textContent =
    [r.agency, r.naics?("NAICS "+r.naics):""].filter(Boolean).join(" · ");
  const sam = document.getElementById("descSam");
  if(r.sam_link){ sam.href=r.sam_link; sam.style.display=""; } else { sam.style.display="none"; }
  const body = document.getElementById("descBody");
  openDrawer();

  if(noticeId in descCache){
    descCurrentText = descCache[noticeId] || "";
    body.textContent = descCurrentText || "No description available for this notice.";
    return;
  }
  body.textContent = "Loading…";
  try{
    const {data,error} = await sb.from("descriptions")
      .select("description_full,status").eq("notice_id",noticeId).limit(1);
    if(error) throw error;
    const row = data && data[0];
    const text = row ? htmlToText(row.description_full) : "";
    descCache[noticeId] = text;
    descCurrentText = text;
    if(text){ body.textContent = text; }
    else if(row && row.status==="none"){ body.textContent = "SAM lists no description for this notice."; }
    else { body.textContent = "Description not fetched yet — it'll appear after the next enrichment run."; }
  }catch(e){
    body.textContent = "Couldn't load description: "+e.message+
      "\n\n(Check the SELECT policy on the descriptions table.)";
  }
}

document.addEventListener("click",e=>{
  const b=e.target.closest(".desc-pill");
  if(b){ e.preventDefault(); showDescription(b.dataset.desc); }
});
document.getElementById("descClose").addEventListener("click",closeDrawer);
document.getElementById("descOverlay").addEventListener("click",closeDrawer);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });
document.getElementById("descCopy").addEventListener("click",function(){
  if(!descCurrentText) return;
  navigator.clipboard.writeText(descCurrentText).then(()=>{
    this.classList.add("copied"); const o=this.innerHTML; this.innerHTML="<span>✓</span> Copied";
    setTimeout(()=>{ this.classList.remove("copied"); this.innerHTML=o; },1400);
  });
});
</script>
