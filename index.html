<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage Ops — Contract Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#13211b; --paper:#f4f1e8; --card:#fffdf7; --line:#d9d2c0;
    --accent:#1d6a4f; --accent-d:#124433; --gold:#b8893b; --red:#9c3a2e;
    --muted:#6b6557; --shadow:0 1px 0 #e7e0cf,0 8px 24px -16px rgba(19,33,27,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);
    background-image:radial-gradient(circle at 1px 1px,rgba(19,33,27,.04) 1px,transparent 0);
    background-size:22px 22px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:28px 24px 80px}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:4px;flex-wrap:wrap;gap:12px}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;letter-spacing:-.5px;line-height:1}
  .brand .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--muted);margin-top:6px}
  .refresh{font-family:'IBM Plex Mono',monospace;font-size:12px;border:1.5px solid var(--ink);
    background:var(--card);padding:9px 16px;cursor:pointer;border-radius:2px;text-transform:uppercase;
    letter-spacing:1px;transition:.15s;display:flex;align-items:center;gap:8px}
  .refresh:hover{background:var(--ink);color:var(--paper)}
  .refresh:disabled{opacity:.5;cursor:wait}

  /* Tabs */
  .tabs{display:flex;gap:0;margin:22px 0 0}
  .tab{font-family:'Fraunces',serif;font-size:18px;font-weight:600;padding:11px 26px;cursor:pointer;
    background:transparent;border:1.5px solid var(--line);border-bottom:none;color:var(--muted);
    border-radius:6px 6px 0 0;position:relative;top:1.5px;transition:.15s}
  .tab .count{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:400;
    margin-left:8px;color:var(--gold)}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--card);color:var(--ink);border-color:var(--ink);border-bottom:1.5px solid var(--card)}
  .panel{border:1.5px solid var(--ink);background:var(--card);border-radius:0 6px 6px 6px;
    box-shadow:var(--shadow);padding:18px}

  /* Stats */
  .stats{display:flex;gap:26px;flex-wrap:wrap;padding:4px 4px 16px;border-bottom:1px dashed var(--line);margin-bottom:16px}
  .stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1}
  .stat .l{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);margin-top:4px}
  .stat.alert .n{color:var(--red)}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .controls input[type=text],.controls select{font-family:'IBM Plex Sans',sans-serif;font-size:13px;
    padding:8px 11px;border:1.5px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink)}
  .controls select{flex:0 0 auto;width:160px;text-overflow:ellipsis}
  .controls input[type=text]{flex:1 1 220px;min-width:180px;max-width:340px}
  .controls input:focus,.controls select:focus{outline:none;border-color:var(--accent)}
  .controls .ghost{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 13px;
    border:1.5px solid var(--line);background:var(--card);cursor:pointer;border-radius:3px;text-transform:uppercase;letter-spacing:1px}
  .controls .ghost:hover{border-color:var(--ink)}
  .controls .ghost.on{background:var(--gold);color:#fff;border-color:var(--gold)}
  .controls .spacer{flex:1}

  #tbl-federal,#tbl-indiana{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;min-width:1060px}
  col.c-title{width:21%} col.c-agency{width:18%} col.c-type{width:11%} col.c-set{width:17%}
  col.c-naics{width:8%} col.c-state{width:6%} col.c-deadline{width:15%}
  col.c-contact{width:20%} col.c-docs{width:8%} col.c-star{width:44px}
  thead th{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--ink);cursor:pointer;white-space:nowrap}
  thead th:hover{color:var(--ink)}
  tbody td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top;
    overflow-wrap:anywhere;word-break:break-word}
  th.col-star,td.col-star{width:42px;text-align:center;padding-left:4px;padding-right:4px}
  tbody tr:hover{background:#faf7ee}
  .t-title{font-weight:600}
  .t-title a{color:var(--accent-d);text-decoration:none;border-bottom:1px solid transparent}
  .t-title a:hover{border-bottom-color:var(--accent-d)}
  .t-desc{color:var(--muted);font-size:12px;margin-top:3px;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;
    border-radius:8px;background:#ece4d2;color:var(--accent-d);white-space:normal;max-width:100%;
    overflow-wrap:anywhere;line-height:1.4}
  .pill.sa{background:#efe3cb;color:var(--gold)}
  .deadline{font-family:'IBM Plex Mono',monospace;white-space:nowrap}
  .dl-soon{color:var(--red);font-weight:600}
  .fav{cursor:pointer;font-size:18px;line-height:1;background:none;border:none;color:var(--line);transition:.15s}
  .fav:hover{color:var(--gold);transform:scale(1.15)}
  .fav.on{color:var(--gold)}
  .mono{font-family:'IBM Plex Mono',monospace;font-size:12px}
  .email{color:var(--accent-d);text-decoration:none}
  .email:hover{text-decoration:underline}

  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:10px}
  .pager{display:flex;gap:6px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px}
  .pager button{border:1.5px solid var(--line);background:var(--card);padding:5px 11px;cursor:pointer;border-radius:3px}
  .pager button:disabled{opacity:.4;cursor:default}
  .msg{padding:40px;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
  .err{color:var(--red)}
  .hidden{display:none}
  @media(max-width:720px){.t-desc{display:none}.brand h1{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Contract Tracker</h1>
      <div class="sub">Vantage Ops Group · Federal &amp; Indiana State</div>
    </div>
    <button class="refresh" id="refreshBtn">↻ Refresh</button>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="federal">Federal <span class="count" id="cnt-federal"></span></button>
    <button class="tab" data-tab="indiana">Indiana State <span class="count" id="cnt-indiana"></span></button>
  </div>

  <div class="panel">
    <!-- ===== FEDERAL ===== -->
    <section id="federal">
      <div class="stats" id="stats-federal"></div>
      <div class="controls">
        <input type="text" id="q-federal" placeholder="Search title, agency, NAICS…">
        <select id="f-type"><option value="">All notice types</option></select>
        <select id="f-setaside"><option value="">All set-asides</option></select>
        <select id="f-sector"><option value="">All sectors</option></select>
        <select id="f-state"><option value="">All states</option></select>
        <button class="ghost" id="fav-federal">★ Favorites</button>
        <div class="spacer"></div>
        <button class="ghost" id="csv-federal">⤓ CSV</button>
      </div>
      <div id="tbl-federal"></div>
      <div class="foot" id="foot-federal"></div>
    </section>

    <!-- ===== INDIANA ===== -->
    <section id="indiana" class="hidden">
      <div class="stats" id="stats-indiana"></div>
      <div class="controls">
        <input type="text" id="q-indiana" placeholder="Search title, agency, description…">
        <select id="i-agency"><option value="">All agencies</option></select>
        <button class="ghost" id="fav-indiana">★ Favorites</button>
        <div class="spacer"></div>
        <button class="ghost" id="csv-indiana">⤓ CSV</button>
      </div>
      <div id="tbl-indiana"></div>
      <div class="foot" id="foot-indiana"></div>
    </section>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — your Supabase project. The publishable key is safe
//  to expose in frontend code (it only allows what your RLS
//  policies permit). Do NOT paste the secret key here.
// ============================================================
const SUPABASE_URL = "https://uiplzvlhihkrheflclou.supabase.co";
const SUPABASE_KEY = "sb_publishable_RC22tCyni4kCUz3TaET2kw_lS_1V6yR";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PAGE = 50;
const state = {
  federal:{ rows:[], view:[], page:1, sortKey:"deadline", sortDir:1, favOnly:false },
  indiana:{ rows:[], view:[], page:1, sortKey:"response_due_by", sortDir:1, favOnly:false }
};

const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const today = new Date();
function fmtDate(d){ if(!d) return "—"; const x=new Date(d); if(isNaN(x)) return esc(d);
  return x.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function daysLeft(d){ if(!d) return null; const x=new Date(d); if(isNaN(x)) return null;
  return Math.ceil((x-today)/864e5); }

// ---------- TABS ----------
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const tab=t.dataset.tab;
  document.getElementById("federal").classList.toggle("hidden",tab!=="federal");
  document.getElementById("indiana").classList.toggle("hidden",tab!=="indiana");
}));

// ============================================================
//  FEDERAL  (reads from `contracts` table)
// ============================================================
async function loadFederal(){
  const box=document.getElementById("tbl-federal");
  box.innerHTML='<div class="msg">Loading federal contracts…</div>';
  // Pull all rows in pages of 1000 (Supabase default cap)
  let all=[], from=0;
  try{
    while(true){
      const {data,error}=await sb.from("contracts").select("*").range(from,from+999);
      if(error) throw error;
      all=all.concat(data);
      if(data.length<1000) break;
      from+=1000;
    }
  }catch(e){ box.innerHTML='<div class="msg err">Could not load federal contracts: '+esc(e.message)+
    '<br><br>Check that RLS read policy is enabled on the <b>contracts</b> table.</div>'; return; }
  state.federal.rows=all;
  document.getElementById("cnt-federal").textContent=all.length;
  buildFederalFilters(all);
  renderFederal();
}
function buildFederalFilters(rows){
  const fill=(id,key)=>{ const sel=document.getElementById(id);
    const vals=[...new Set(rows.map(r=>r[key]).filter(Boolean))].sort();
    sel.length=1; vals.forEach(v=>{const o=document.createElement("option");o.value=v;
      o.textContent=v.length>42?v.slice(0,40)+"…":v; sel.appendChild(o);}); };
  fill("f-type","notice_type"); fill("f-setaside","set_aside");
  fill("f-sector","sector"); fill("f-state","state");
}
function federalFilter(){
  const q=document.getElementById("q-federal").value.toLowerCase();
  const ty=document.getElementById("f-type").value, sa=document.getElementById("f-setaside").value,
        se=document.getElementById("f-sector").value, st=document.getElementById("f-state").value;
  const favs=getFavs("federal");
  state.federal.view=state.federal.rows.filter(r=>{
    if(ty&&r.notice_type!==ty) return false;
    if(sa&&r.set_aside!==sa) return false;
    if(se&&r.sector!==se) return false;
    if(st&&r.state!==st) return false;
    if(state.federal.favOnly&&!favs.has(r.notice_id)) return false;
    if(q){ const h=(r.title+" "+r.agency+" "+r.naics+" "+(r.solicitation||"")).toLowerCase();
      if(!h.includes(q)) return false; }
    return true;
  });
  sortRows("federal"); state.federal.page=1; renderFederal();
}
function renderFederal(){
  const s=state.federal, favs=getFavs("federal");
  const start=(s.page-1)*PAGE, slice=s.view.slice(start,start+PAGE);
  const openCt=s.rows.filter(r=>{const d=daysLeft(r.deadline);return d===null||d>=0;}).length;
  const soon=s.rows.filter(r=>{const d=daysLeft(r.deadline);return d!==null&&d>=0&&d<=7;}).length;
  document.getElementById("stats-federal").innerHTML=
    stat(s.rows.length,"Total")+stat(openCt,"Open")+stat(soon,"Closing ≤7d","alert")+
    stat(favs.size,"Favorites");
  if(!slice.length){document.getElementById("tbl-federal").innerHTML='<div class="msg">No matches.</div>';
    document.getElementById("foot-federal").innerHTML="";return;}
  let h='<table><colgroup><col class="c-title"><col class="c-agency"><col class="c-type"><col class="c-set"><col class="c-naics"><col class="c-state"><col class="c-deadline"><col class="c-star"></colgroup><thead><tr>'+
    th("federal","title","Title")+th("federal","agency","Agency")+
    th("federal","notice_type","Type")+th("federal","set_aside","Set-Aside")+
    th("federal","naics","NAICS")+th("federal","state","State")+
    th("federal","deadline","Deadline")+'<th class="col-star">★</th></tr></thead><tbody>';
  slice.forEach(r=>{
    const dl=daysLeft(r.deadline), soonC=dl!==null&&dl>=0&&dl<=7?"dl-soon":"";
    h+='<tr><td class="t-title"><a href="'+esc(r.sam_link||"#")+'" target="_blank">'+esc(r.title)+'</a></td>'+
      '<td>'+esc(r.agency)+'</td>'+
      '<td>'+(r.notice_type?'<span class="pill">'+esc(r.notice_type)+'</span>':'—')+'</td>'+
      '<td>'+(r.set_aside?'<span class="pill sa">'+esc(r.set_aside)+'</span>':'—')+'</td>'+
      '<td class="mono">'+esc(r.naics||"—")+'</td>'+
      '<td class="mono">'+esc(r.state||"—")+'</td>'+
      '<td class="deadline '+soonC+'">'+fmtDate(r.deadline)+(dl!==null&&dl>=0?' <span style="color:var(--muted)">('+dl+'d)</span>':'')+'</td>'+
      '<td class="col-star"><button class="fav '+(favs.has(r.notice_id)?"on":"")+'" data-id="'+esc(r.notice_id)+'" data-tab="federal">★</button></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById("tbl-federal").innerHTML=h;
  document.getElementById("foot-federal").innerHTML=footer("federal");
  wireFavButtons("federal");
}

// ============================================================
//  INDIANA  (reads from `indiana_contracts_view`, favorites in `indiana_favorites`)
// ============================================================
async function loadIndiana(){
  const box=document.getElementById("tbl-indiana");
  box.innerHTML='<div class="msg">Loading Indiana contracts…</div>';
  try{
    const {data,error}=await sb.from("indiana_contracts_view").select("*").eq("is_active",true);
    if(error) throw error;
    state.indiana.rows=data;
    document.getElementById("cnt-indiana").textContent=data.length;
    const sel=document.getElementById("i-agency");
    [...new Set(data.map(r=>r.agency).filter(Boolean))].sort().forEach(v=>{
      const o=document.createElement("option");o.value=v;o.textContent=v;sel.appendChild(o);});
    renderIndiana();
  }catch(e){ box.innerHTML='<div class="msg err">Could not load Indiana contracts: '+esc(e.message)+
    '<br><br>Check that RLS read policy is enabled on <b>indiana_contracts</b>.</div>'; }
}
function indianaFilter(){
  const q=document.getElementById("q-indiana").value.toLowerCase();
  const ag=document.getElementById("i-agency").value;
  state.indiana.view=state.indiana.rows.filter(r=>{
    if(ag&&r.agency!==ag) return false;
    if(state.indiana.favOnly&&!r.is_favorited) return false;
    if(q){ const h=(r.title+" "+r.agency+" "+(r.description||"")).toLowerCase();
      if(!h.includes(q)) return false; }
    return true;
  });
  sortRows("indiana"); state.indiana.page=1; renderIndiana();
}
function renderIndiana(){
  const s=state.indiana;
  if(!s.view.length && !s.favOnly && !document.getElementById("q-indiana").value
     && !document.getElementById("i-agency").value){ s.view=s.rows.slice(); }
  const start=(s.page-1)*PAGE, slice=s.view.slice(start,start+PAGE);
  const soon=s.rows.filter(r=>{const d=daysLeft(r.response_due_by);return d!==null&&d>=0&&d<=7;}).length;
  const favCt=s.rows.filter(r=>r.is_favorited).length;
  document.getElementById("stats-indiana").innerHTML=
    stat(s.rows.length,"Open Bids")+stat(soon,"Closing ≤7d","alert")+stat(favCt,"Favorites");
  if(!slice.length){document.getElementById("tbl-indiana").innerHTML='<div class="msg">No matches.</div>';
    document.getElementById("foot-indiana").innerHTML="";return;}
  let h='<table><colgroup><col class="c-title"><col class="c-agency"><col class="c-deadline"><col class="c-contact"><col class="c-docs"><col class="c-star"></colgroup><thead><tr>'+
    th("indiana","title","Title")+th("indiana","agency","Agency")+
    th("indiana","response_due_by","Response Due")+th("indiana","contact_email","Contact")+
    '<th>Docs</th><th class="col-star">★</th></tr></thead><tbody>';
  slice.forEach(r=>{
    const dl=daysLeft(r.response_due_by), soonC=dl!==null&&dl>=0&&dl<=7?"dl-soon":"";
    h+='<tr><td class="t-title">'+(r.bid_docs_url?'<a href="'+esc(r.bid_docs_url)+'" target="_blank">'+esc(r.title)+'</a>':esc(r.title))+
      (r.description?'<div class="t-desc">'+esc(r.description)+'</div>':'')+'</td>'+
      '<td>'+esc(r.agency)+'</td>'+
      '<td class="deadline '+soonC+'">'+fmtDate(r.response_due_by)+(dl!==null&&dl>=0?' <span style="color:var(--muted)">('+dl+'d)</span>':'')+'</td>'+
      '<td>'+(r.contact_email?'<a class="email" href="mailto:'+esc(r.contact_email)+'">'+esc(r.contact_name||r.contact_email)+'</a>':'—')+'</td>'+
      '<td>'+(r.bid_docs_url?'<a class="email" href="'+esc(r.bid_docs_url)+'" target="_blank">zip ⤓</a>':'—')+'</td>'+
      '<td class="col-star"><button class="fav '+(r.is_favorited?"on":"")+'" data-id="'+esc(r.event_id)+'" data-tab="indiana">★</button></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById("tbl-indiana").innerHTML=h;
  document.getElementById("foot-indiana").innerHTML=footer("indiana");
  wireFavButtons("indiana");
}

// ---------- shared helpers ----------
function stat(n,l,cls=""){return '<div class="stat '+cls+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function th(tab,key,label){const s=state[tab];const arrow=s.sortKey===key?(s.sortDir>0?" ↑":" ↓"):"";
  return '<th data-sort="'+key+'" data-tab="'+tab+'">'+label+arrow+'</th>';}
function footer(tab){const s=state[tab];const pages=Math.max(1,Math.ceil(s.view.length/PAGE));
  return '<div class="mono" style="color:var(--muted)">Showing '+
    Math.min((s.page-1)*PAGE+1,s.view.length)+'–'+Math.min(s.page*PAGE,s.view.length)+' of '+s.view.length+'</div>'+
    '<div class="pager"><button '+(s.page<=1?"disabled":"")+' data-pg="prev" data-tab="'+tab+'">‹ Prev</button>'+
    '<span>'+s.page+' / '+pages+'</span>'+
    '<button '+(s.page>=pages?"disabled":"")+' data-pg="next" data-tab="'+tab+'">Next ›</button></div>';}
function sortRows(tab){const s=state[tab];const k=s.sortKey;
  s.view.sort((a,b)=>{let x=a[k],y=b[k];
    if(k==="deadline"||k==="response_due_by"){x=new Date(x||"2999");y=new Date(y||"2999");}
    else{x=String(x||"").toLowerCase();y=String(y||"").toLowerCase();}
    return x<y?-1*s.sortDir:x>y?1*s.sortDir:0;});}

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-sort]");
  if(t){const tab=t.dataset.tab,s=state[tab];
    if(s.sortKey===t.dataset.sort)s.sortDir*=-1;else{s.sortKey=t.dataset.sort;s.sortDir=1;}
    sortRows(tab); tab==="federal"?renderFederal():renderIndiana(); return;}
  const p=e.target.closest("[data-pg]");
  if(p){const tab=p.dataset.tab,s=state[tab];
    s.page+=p.dataset.pg==="next"?1:-1; tab==="federal"?renderFederal():renderIndiana();}
});

// ---------- favorites ----------
// Indiana favorites persist in Supabase (indiana_favorites table).
// Federal favorites use localStorage for now — we can move them to a
// Supabase table once we confirm how the federal side should store them.
function getFavs(tab){
  if(tab==="federal") return new Set(JSON.parse(localStorage.getItem("fed_favs")||"[]"));
  return new Set(state.indiana.rows.filter(r=>r.is_favorited).map(r=>r.event_id));
}
function wireFavButtons(tab){
  document.querySelectorAll('#'+tab+' .fav').forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const id=btn.dataset.id;
      if(tab==="federal"){
        const favs=new Set(JSON.parse(localStorage.getItem("fed_favs")||"[]"));
        favs.has(id)?favs.delete(id):favs.add(id);
        localStorage.setItem("fed_favs",JSON.stringify([...favs]));
        renderFederal();
      }else{
        const row=state.indiana.rows.find(r=>r.event_id===id);
        const now=!row.is_favorited;
        btn.classList.toggle("on",now); row.is_favorited=now; // optimistic
        try{
          if(now){ await sb.from("indiana_favorites").insert({event_id:id}); }
          else{ await sb.from("indiana_favorites").delete().eq("event_id",id); }
        }catch(err){ row.is_favorited=!now; btn.classList.toggle("on",!now);
          alert("Couldn't save favorite — check RLS policies on indiana_favorites.\n"+err.message); }
        renderIndiana();
      }
    });
  });
}
["fav-federal","fav-indiana"].forEach(id=>{
  document.getElementById(id).addEventListener("click",e=>{
    const tab=id.split("-")[1]; state[tab].favOnly=!state[tab].favOnly;
    e.target.classList.toggle("on",state[tab].favOnly);
    tab==="federal"?federalFilter():indianaFilter();
  });
});

// ---------- CSV ----------
function exportCSV(tab){
  const rows=state[tab].view;
  if(!rows.length){alert("Nothing to export.");return;}
  const cols=Object.keys(rows[0]);
  const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>'"'+String(r[c]??"").replace(/"/g,'""')+'"').join(","))).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=tab+"_contracts_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
}
document.getElementById("csv-federal").addEventListener("click",()=>exportCSV("federal"));
document.getElementById("csv-indiana").addEventListener("click",()=>exportCSV("indiana"));

// ---------- search / filter wiring ----------
["q-federal","f-type","f-setaside","f-sector","f-state"].forEach(id=>
  document.getElementById(id).addEventListener("input",federalFilter));
["q-indiana","i-agency"].forEach(id=>
  document.getElementById(id).addEventListener("input",indianaFilter));

// ---------- refresh ----------
document.getElementById("refreshBtn").addEventListener("click",async function(){
  this.disabled=true; this.textContent="↻ Refreshing…";
  await Promise.all([loadFederal(),loadIndiana()]);
  this.disabled=false; this.textContent="↻ Refresh";
});

// ---------- init ----------
(async function(){
  await loadFederal();
  state.federal.view=state.federal.rows.slice(); sortRows("federal"); renderFederal();
  await loadIndiana();
  state.indiana.view=state.indiana.rows.slice(); sortRows("indiana"); renderIndiana();
})();
</script>
